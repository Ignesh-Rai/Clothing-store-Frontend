<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart | IMG Square</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #d4af37;
            color: white;
        }

        .logo-section {
            display: flex;
            align-items: center;
        }

        .logo-section img {
            height: 50px;
            margin-right: 10px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-size: 16px;
            font-weight: bold;
        }

        marquee {
            background-color: #333;
            color: gold;
            padding: 5px;
            font-weight: bold;
        }

        .cart-box {
            width: 700px;
            margin: 30px auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 5px;
        }

        .cart-item-details {
            width: 300px;
            text-align: left;
        }

        .cart-item-details h4 {
            margin: 0;
            font-size: 18px;
        }

        .remove-btn {
            background-color: red;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .summary {
            margin-top: 20px;
            text-align: right;
            padding: 20px;
            border-top: 2px solid #ddd;
        }

        .summary h2 {
            margin-bottom: 10px;
        }

        .checkout-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .checkout-btn:hover {
            background-color: #d4af37;
        }

        .empty-msg {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <img src="images/logo.png" alt="Logo">
            <h1>IMG Square</h1>
        </div>

        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="cart.html">Cart <span id="cc">0</span></a>
            <span id="user-info" class="hidden">
                 <span id="msg"></span>
                 <a href="#" onclick="logout()">Logout</a>
            </span>
        </nav>
    </header>

    <marquee direction="left">
        🛒 Your Cart - Confirm Your Style Choice! | ✨ Only the Best for You! ✨
    </marquee>

    <div class="cart-box">
        <h2 style="text-align: center;">My Shopping Cart</h2>
        <div id="cart-list"></div>
        <div class="summary" id="cart-summary" style="display: none;">
            <h2>Total: $<span id="total-price">0.00</span></h2>
            <button class="checkout-btn" onclick="goToCheckout()">Checkout Now</button>
        </div>
        <div id="empty-cart" class="empty-msg">
            <h2>Your cart is empty!</h2>
            <a href="index.html" class="checkout-btn" style="display: block; width: 150px; margin: 20px auto; text-decoration: none; text-align: center;">Go To Home</a>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let user = JSON.parse(localStorage.getItem('currentUser')) || null;

        function updateUI() {
            if (user) {
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('msg').innerText = "Hi, " + user.name;
            } else {
                window.location.href = "login.html";
            }
            document.getElementById('cc').innerText = cart.length;
        }

        function showCart() {
            let container = document.getElementById('cart-list');
            let summary = document.getElementById('cart-summary');
            let empty = document.getElementById('empty-cart');

            if (cart.length === 0) {
                container.innerHTML = "";
                summary.style.display = "none";
                empty.style.display = "block";
                return;
            }

            empty.style.display = "none";
            summary.style.display = "block";

            let html = "";
            let total = 0;
            for (let i = 0; i < cart.length; i++) {
                let p = cart[i];
                html += `
                    <div class="cart-item">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="cart-item-details">
                            <h4>${p.name}</h4>
                            <p style="color: #666;">Price: $${p.price.toFixed(2)}</p>
                        </div>
                        <div style="font-weight: bold; font-size: 18px;">$${p.price.toFixed(2)}</div>
                        <button class="remove-btn" onclick="remove(${i})">X</button>
                    </div>
                `;
                total += p.price;
            }
            container.innerHTML = html;
            document.getElementById('total-price').innerText = total.toFixed(2);
        }

        function remove(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            location.reload();
        }

        function goToCheckout() {
            window.location.href = "checkout.html";
        }

        function logout() {
            localStorage.removeItem('currentUser');
            location.reload();
        }

        updateUI();
        showCart();
    </script>
</body>
</html>
